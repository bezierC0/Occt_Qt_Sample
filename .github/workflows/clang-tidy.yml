name: Clang-Tidy Static Analysis

on:
  workflow_dispatch:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    env:
      QT_VERSION: '5.14.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtcharts qtdatavis3d qtnetworkauth'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            libocct-data-exchange-dev \
            libocct-draw-dev \
            libocct-foundation-dev \
            libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev \
            libocct-ocaf-dev \
            libocct-visualization-dev \
            libtbb-dev

      - name: Configure CMake (generate compile_commands.json)
        run: |
          mkdir build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Run clang-tidy
        run: |
          clang-tidy \
            ${{ github.workspace }}/src/core_api/CadProcessor.cpp \
            -p ${{ github.workspace }}/build \
            "--header-filter=^${{ github.workspace }}/src/.*" \
            --extra-arg=-Wno-deprecated-declarations
            #--warnings-as-errors="readability-identifier-naming"
